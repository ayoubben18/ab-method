# AB Method Structure Index
# Where AB Method workflows read from and write to.

project_structure:
  # Root-level domain documentation (per domain-model + ubiquitous-language skills)
  root:
    files:
      - UBIQUITOUS_LANGUAGE.md   # flat glossary (ubiquitous-language skill format)
      - CONTEXT.md               # bounded-context overview (domain-model skill format)
      # OR, for multi-context repos:
      # - CONTEXT-MAP.md         # lists contexts and their relationships
      # with per-context CONTEXT.md files inside src/<context>/

  docs:
    architecture:
      files:
        - tech-stack.md          # stack + entry points + external services + constraints + testing
        - frontend-patterns.md
        - backend-patterns.md

    adr:
      # Created lazily by /domain-model when the first ADR is needed.
      # Sequential numbering: 0001-slug.md, 0002-slug.md, ...
      files: []

    tasks:
      # Example task structure — progress-tracker.md is the SINGLE source of
      # truth per task. Missions are one-line entries inside it; no separate
      # mission files. Each mission runs through the `tdd` skill.
      # Missions may carry an optional [pp-x] tag (user opt-in only): same tag
      # = a group of independent missions that run concurrently in subagents;
      # untagged missions are sequential barriers.
      todo-table-creation:
        files:
          - progress-tracker.md
          - review.md             # post-implementation review (review-implementation
                                  # skill); written by autonomous runs (start-task /
                                  # start-roadmap): safe fixes marked applied, the rest
                                  # left open for the user. Absent until a review runs.
        folders:
          - sub-agents-outputs/   # only created when a subagent runs

    goals:
      # Example goal structure — produced by /create-goal. goal.md is the
      # prompt pasted into an autonomous `/goal` loop; progress-tracker.md
      # is the checklist + discoveries log the loop maintains while running.
      add-dark-mode:
        files:
          - goal.md
          - progress-tracker.md

    roadmaps:
      # Example roadmap structure — produced by /create-roadmap. roadmap.md
      # is the roadmap-level single source of truth: a DAG of tasks with
      # `depends-on` edges, plus per-task `plan:` (⬜/✅) and `status:`
      # (pending/in-dev/done). The roadmap references tasks by slug; the
      # tasks themselves live under docs/tasks/<slug>/ (reused, not nested),
      # so every task workflow still operates on them. /start-roadmap
      # executes the graph in dependency order, independent tasks optionally
      # in parallel (git worktrees or sequential — user's choice per run).
      payments-v2:
        files:
          - roadmap.md

    handoffs:
      # Side-topics spun off mid-grill by the `handoff` skill. Each is a
      # single self-contained markdown file named after the topic; it freezes
      # a tangent so the current grill can continue. /create-task-from-handoff
      # resumes one and deletes it once it becomes a task.
      files: []   # e.g. rate-limit-redis-vs-token-bucket.md

# Workflow output destinations
workflow_outputs:
  analyze-project:
    - UBIQUITOUS_LANGUAGE.md
    - CONTEXT.md
    - docs/architecture/tech-stack.md
    - docs/architecture/frontend-patterns.md
    - docs/architecture/backend-patterns.md
  analyze-frontend: docs/architecture/frontend-patterns.md
  analyze-backend: docs/architecture/backend-patterns.md
  domain-model:
    - CONTEXT.md          # refined inline during the grilling session
    - docs/adr/           # ADRs created lazily
  create-task: docs/tasks/[task-name]/progress-tracker.md   # runs critique-plan (pre-impl, advisory) before validating missions, then review-implementation + sync-architecture (post-impl, interactive) after the last mission
  critique-plan: []   # pre-implementation critic; read-only, surfaces domain-model pushbacks only (may prompt an ADR under docs/adr/ on a load-bearing dismissal). Invoked by create-task / create-roadmap, or standalone
  review-implementation: docs/tasks/[task-name]/review.md   # post-implementation review; three critics on the task diff. Writes review.md on autonomous runs; interactive runs present findings instead
  sync-architecture:   # post-implementation documentation-sync detector; read-only. ONE subagent finds what
    - docs/architecture/tech-stack.md        # the task diff introduced that the docs don't capture (endpoints,
    - docs/architecture/frontend-patterns.md # patterns, deps, terms, ADR candidates) and routes each to its doc
    - docs/architecture/backend-patterns.md  # via /update-architecture's table. Autonomous: applies append-only
    - UBIQUITOUS_LANGUAGE.md                 # safe-adds (commit `docs(<task>): sync architecture docs`), defers
    - CONTEXT.md                             # prose deprecation / domain reshapes / ADRs to /domain-model +
                                             # /update-architecture. Interactive: presents deltas. Runs after
                                             # review-implementation in create-task / start-task / start-roadmap
  reconcile-roadmap: []   # pre-execution cross-plan coherence critic; read-only. Reads roadmap.md +
                          # every planned task's progress-tracker.md and surfaces seam/gap/overlap/
                          # ordering/terminology/assumption discrepancies ACROSS the whole roadmap.
                          # Standalone (/reconcile-roadmap <name>); complements critique-plan (single
                          # plan, pre-impl) and review-implementation (one diff, post-impl)
  create-task-from-handoff: docs/tasks/[task-name]/progress-tracker.md   # reads docs/handoffs/[slug].md, deletes it once the task exists
  extend-task: docs/tasks/[task-name]/progress-tracker.md
  resume-task: docs/tasks/[task-name]/progress-tracker.md
  handoff: docs/handoffs/[slug].md   # `handoff` skill; falls back to OS temp dir outside an AB Method project
  create-goal:
    - docs/goals/[goal-name]/goal.md
    - docs/goals/[goal-name]/progress-tracker.md
  extend-goal:
    - docs/goals/[goal-name]/goal.md   # updated in place; progress-tracker.md carries forward
  create-roadmap: docs/roadmaps/[roadmap-name]/roadmap.md   # DAG of tasks; runs critique-plan on the graph (pre-impl, advisory) before emitting per-task create-task prompts in dep order
  start-task:
    - docs/tasks/[task-name]/progress-tracker.md   # autonomous run; mission subagents update the tracker, parent commits per mission
    - docs/tasks/[task-name]/review.md   # post-impl review-implementation pass after the last mission: safe fixes applied, open findings recorded
    - docs/architecture/*   # post-impl sync-architecture pass (Step 5c): append-only doc safe-adds committed as docs(<task>): sync architecture docs
  start-roadmap:
    - docs/roadmaps/[roadmap-name]/roadmap.md   # statuses updated as tasks run; verifies plans exist before executing
    - docs/tasks/[task-name]/progress-tracker.md   # each task executes like start-task (subagent per mission, commit per green mission)
    - docs/tasks/[task-name]/review.md   # each task's post-impl review (inherited from start-task rules)
    - docs/architecture/*   # each task's post-impl sync-architecture pass (inherited from start-task rules)

# How the workflows and their artifacts reference each other. Any workflow
# reads this file first, so this map is how they "know about each other"
# instead of being siloed.
relationships:
  roadmap_to_task:
    # A roadmap (docs/roadmaps/<name>/roadmap.md) lists tasks by slug. Each
    # slug resolves to a normal task at docs/tasks/<slug>/ — tasks are NOT
    # nested inside the roadmap folder, so resume-task / extend-task / etc.
    # all still work on them unchanged.
    roadmap: docs/roadmaps/[roadmap-name]/roadmap.md
    tasks: docs/tasks/[task-slug]/
    edges: "roadmap.md `depends-on:` fields form a DAG; independent tasks parallelize"
  create_task_is_roadmap_aware:
    # /create-task (and ab-create-task) checks docs/roadmaps/*/roadmap.md at
    # the start of every run. If the requested task matches an entry marked
    # `plan: ⬜ unplanned`, it plans it AS a roadmap task (seeds the grill
    # with the roadmap Objective + upstream deps' summaries) and flips that
    # entry to `plan: ✅ planned` on completion. No match → standalone task.
    detect_in: docs/roadmaps/*/roadmap.md
    on_match: "seed grill from Objective + upstream deps; write plan:✅ back on completion"
    on_no_match: "standalone task, roadmaps ignored"
  start_roadmap_verifies_plans:
    # /start-roadmap will NOT execute a task whose dependency lacks a plan.
    # It verifies the whole dependency tree first: a task is runnable only if
    # its progress-tracker.md exists (plan:✅) and its deps are truly done.
    # An unplanned live dependency halts the run with instructions to plan it.
    gate: "every runnable task needs plan:✅ (real progress-tracker.md) + deps done (no unchecked missions)"
  extend_task_reopens_roadmap:
    # /extend-task (and ab-extend-task) is roadmap-aware: adding missions to a
    # task that belongs to a roadmap flips that task's roadmap entry from
    # status:done back to status:pending (and the roadmap Status from Completed
    # back to In dev). This is the incremental case — after a completed
    # roadmap, tweak tasks with extend-task, then re-run /start-roadmap.
    reopens: "roadmap.md task status:done → pending; roadmap Status:Completed → In dev"
    signal_of_truth: "a task NEEDS WORK when its progress-tracker.md has any unchecked mission, regardless of status: field"
    rerun: "/start-roadmap re-verifies the tree and runs only tasks that need work, in dependency order; done tasks are skipped"
  reconcile_roadmap_checks_across_plans:
    # /reconcile-roadmap is the cross-plan coherence critic. Where critique-plan
    # judges ONE plan against the domain model (the coarse DAG at create-roadmap
    # time, or a single task's missions at create-task time), reconcile-roadmap
    # reads the WHOLE set of finished progress-tracker.md files together and checks
    # the seams the roadmap's depends-on edges promised are honored on both sides.
    # Read-only, advisory, standalone — run it after planning and before
    # /start-roadmap. It never edits a plan or blocks a run.
    reads: "docs/roadmaps/<name>/roadmap.md + every plan:✅ task's docs/tasks/<slug>/progress-tracker.md + domain model"
    finds: "broken seams (consumer with no producer), coverage gaps, duplication, reversed/missing edges, cross-task terminology drift, conflicting assumptions"
    complements: "critique-plan (single plan, pre-impl) and review-implementation (one diff, post-impl)"
  sync_architecture_is_the_auto_detector:
    # sync-architecture is the automated detection half of /update-architecture.
    # It runs post-implementation (right after review-implementation) in create-task /
    # start-task / start-roadmap, so architecture docs stay live without anyone
    # remembering to run /update-architecture by hand. It only APPENDS (safe-adds);
    # anything that rewrites prose, reshapes the domain, or is ADR-worthy is deferred.
    runs_after: "review-implementation, on the same task diff (post-impl phase)"
    applies: "append-only safe-adds to docs/architecture/* + UBIQUITOUS_LANGUAGE.md/CONTEXT.md (autonomous) or presents them (interactive)"
    defers_to: "/update-architecture (prose deprecation + improve-codebase-architecture deepening loop) and /domain-model (ADRs, new bounded contexts)"
    reuses: "/update-architecture routing table (2a endpoints, 2b patterns, 2c stack/deps, 2d domain, 2e ADR)"

# Inputs that downstream workflows should read for domain context
domain_inputs:
  - UBIQUITOUS_LANGUAGE.md
  - CONTEXT.md
